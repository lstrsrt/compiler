name: Build

on: [push, pull_request]

jobs:
  archlinux:
    name: Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
          clang \
          cmake \
          git \
          mold \
          ninja \
          pkgconf \
          xmake

      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build
        run: |
          xmake --root -y
